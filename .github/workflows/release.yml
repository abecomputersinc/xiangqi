name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.0.3"
        required: true
        type: string
      pikafish_url:
        description: "Direct URL for the official Pikafish release .7z archive"
        required: true
        default: "https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z"
        type: string
      upload_to_release:
        description: "Upload artifacts to the GitHub release for tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  PIKAFISH_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.pikafish_url || 'https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z' }}

jobs:
  prepare-pikafish:
    name: Prepare Pikafish assets
    runs-on: ubuntu-latest

    steps:
      - name: Install archive tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full || sudo apt-get install -y 7zip

      - name: Download Pikafish release archive
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/pikafish.7z"
          release_dir="${RUNNER_TEMP}/pikafish-release"
          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --max-time 300 \
            "${PIKAFISH_URL}" \
            -o "${archive}"
          rm -rf "${release_dir}"
          mkdir -p "${release_dir}"
          7z x "${archive}" -o"${release_dir}" -y

      - name: Prepare platform bundles
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${RUNNER_TEMP}/pikafish-release"
          assets_dir="${RUNNER_TEMP}/pikafish-assets"
          rm -rf "${assets_dir}"
          mkdir -p "${assets_dir}"

          nnue_path="$(find "${release_dir}" -type f -name 'pikafish.nnue' -print -quit)"
          if [ -z "${nnue_path}" ]; then
            echo "::error::pikafish.nnue was not found in the Pikafish release archive."
            exit 1
          fi
          install -m 644 "${nnue_path}" "${assets_dir}/pikafish.nnue"

          copy_unix_engines() {
            local archive_dir_name="$1"
            local bundle_name="$2"
            local label="$3"
            local platform_dir
            platform_dir="$(find "${release_dir}" -type d -name "${archive_dir_name}" -print -quit)"
            if [ -z "${platform_dir}" ]; then
              echo "::error::Could not find the ${label} engine directory in the Pikafish release archive."
              find "${release_dir}" -maxdepth 3 -type d -print
              exit 1
            fi

            local target_dir="${assets_dir}/${bundle_name}/pikafish-engines"
            mkdir -p "${target_dir}"
            while IFS= read -r engine_path; do
              install -m 755 "${engine_path}" "${target_dir}/$(basename "${engine_path}")"
            done < <(find "${platform_dir}" -maxdepth 1 -type f -name 'pikafish*' ! -name '*.nnue' | sort)
            if ! find "${target_dir}" -maxdepth 1 -type f -name 'pikafish*' -print -quit | grep -q .; then
              echo "::error::Could not find ${label} Pikafish engines in the release archive."
              exit 1
            fi
          }

          copy_windows_engines() {
            local platform_dir
            platform_dir="$(find "${release_dir}" -type d -name Windows -print -quit)"
            if [ -z "${platform_dir}" ]; then
              echo "::error::Could not find the Windows engine directory in the Pikafish release archive."
              find "${release_dir}" -maxdepth 3 -type d -print
              exit 1
            fi

            local target_dir="${assets_dir}/windows/pikafish-engines"
            mkdir -p "${target_dir}"
            while IFS= read -r engine_path; do
              install -m 644 "${engine_path}" "${target_dir}/$(basename "${engine_path}")"
            done < <(find "${platform_dir}" -maxdepth 1 -type f -name 'pikafish*.exe' | sort)
            if ! find "${target_dir}" -maxdepth 1 -type f -name 'pikafish*.exe' -print -quit | grep -q .; then
              echo "::error::Could not find Windows Pikafish engines in the release archive."
              exit 1
            fi
          }

          copy_unix_engines Linux linux Linux
          copy_windows_engines
          copy_unix_engines MacOS macos-arm64 macOS
          find "${assets_dir}" -type f -print | sort

      - name: Pack prepared Pikafish assets
        shell: bash
        run: |
          set -euo pipefail
          tar -C "${RUNNER_TEMP}/pikafish-assets" -czf "${RUNNER_TEMP}/pikafish-assets.tar.gz" .
          tar -tzf "${RUNNER_TEMP}/pikafish-assets.tar.gz" | sort

      - name: Upload prepared Pikafish assets
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-assets-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: ${{ runner.temp }}/pikafish-assets.tar.gz

  build-linux:
    name: Build Linux
    needs: prepare-pikafish
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download prepared Pikafish assets
        uses: actions/download-artifact@v4
        with:
          name: pikafish-assets-${{ env.RELEASE_TAG }}
          path: pikafish-assets

      - name: Extract prepared Pikafish assets
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf pikafish-assets/pikafish-assets.tar.gz -C pikafish-assets

      - name: Install bundled Pikafish assets
        shell: bash
        run: |
          set -euo pipefail
          source_dir="pikafish-assets/linux/pikafish-engines"
          if [ ! -d "${source_dir}" ]; then
            echo "::error::The prepared Linux Pikafish engine bundle is missing."
            exit 1
          fi
          rm -rf pikafish-engines
          mkdir -p pikafish-engines
          while IFS= read -r engine_path; do
            install -m 755 "${engine_path}" "pikafish-engines/$(basename "${engine_path}")"
          done < <(find "${source_dir}" -maxdepth 1 -type f -name 'pikafish*' | sort)
          if ! find pikafish-engines -maxdepth 1 -type f -name 'pikafish*' -print -quit | grep -q .; then
            echo "::error::Could not find Linux Pikafish engines in the prepared bundle."
            exit 1
          fi
          if [ ! -s pikafish-assets/pikafish.nnue ]; then
            echo "::error::pikafish.nnue is missing or empty in the prepared bundle."
            exit 1
          fi
          install -m 644 pikafish-assets/pikafish.nnue pikafish.nnue
          find pikafish-engines -maxdepth 1 -type f -print | sort

      - name: Validate engine assets
        shell: bash
        run: |
          set -euo pipefail
          file pikafish-engines/* pikafish.nnue
          for engine_path in pikafish-engines/pikafish*; do
            file "${engine_path}" | grep -q "ELF" || {
              echo "::error::${engine_path} must be a Linux ELF executable."
              exit 1
            }
          done
          test -s pikafish.nnue || {
            echo "::error::pikafish.nnue is missing or empty."
            exit 1
          }

      - name: Build packages
        run: npm run dist:linux

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: linux
          ARTIFACT_SUFFIXES: ".AppImage,.deb,.tar.gz"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-linux-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/linux-sha256.txt

  build-windows:
    name: Build Windows
    needs: prepare-pikafish
    runs-on: windows-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download prepared Pikafish assets
        uses: actions/download-artifact@v4
        with:
          name: pikafish-assets-${{ env.RELEASE_TAG }}
          path: pikafish-assets

      - name: Extract prepared Pikafish assets
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf pikafish-assets/pikafish-assets.tar.gz -C pikafish-assets

      - name: Install bundled Pikafish assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sourceDir = Join-Path (Get-Location) "pikafish-assets/windows/pikafish-engines"
          if (!(Test-Path -LiteralPath $sourceDir)) {
            throw "The prepared Windows Pikafish engine bundle is missing."
          }
          $targetDir = Join-Path (Get-Location) "pikafish-engines"
          if (Test-Path -LiteralPath $targetDir) {
            Remove-Item -LiteralPath $targetDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $targetDir | Out-Null
          $engines = Get-ChildItem -LiteralPath $sourceDir -File -Filter "pikafish*.exe" | Sort-Object Name
          if (!$engines) {
            throw "Could not find Windows Pikafish engines in the prepared bundle."
          }
          foreach ($engine in $engines) {
            Copy-Item -LiteralPath $engine.FullName -Destination (Join-Path $targetDir $engine.Name) -Force
          }
          $nnuePath = Join-Path (Get-Location) "pikafish-assets/pikafish.nnue"
          if (!(Test-Path -LiteralPath $nnuePath)) {
            throw "pikafish.nnue is missing from the prepared bundle."
          }
          Copy-Item -LiteralPath $nnuePath -Destination "pikafish.nnue" -Force
          Get-ChildItem -LiteralPath $targetDir -File | Select-Object Name, Length | Format-Table -AutoSize

      - name: Validate engine assets
        shell: pwsh
        run: |
          if (!(Test-Path "pikafish-engines")) { throw "pikafish-engines was not created." }
          if (!(Get-ChildItem -LiteralPath "pikafish-engines" -File -Filter "pikafish*.exe")) { throw "No Windows Pikafish engines were copied." }
          if (!(Test-Path "pikafish.nnue")) { throw "pikafish.nnue was not copied from the prepared bundle." }
          Get-ChildItem pikafish-engines
          Get-Item pikafish.nnue | Format-Table Name, Length

      - name: Build packages
        run: npm run dist:win

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: windows
          ARTIFACT_SUFFIXES: ".exe,.zip"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-windows-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/windows-sha256.txt

  build-macos-arm64:
    name: Build macOS ARM64
    needs: prepare-pikafish
    runs-on: macos-15

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download prepared Pikafish assets
        uses: actions/download-artifact@v4
        with:
          name: pikafish-assets-${{ env.RELEASE_TAG }}
          path: pikafish-assets

      - name: Extract prepared Pikafish assets
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf pikafish-assets/pikafish-assets.tar.gz -C pikafish-assets

      - name: Install bundled Pikafish assets
        shell: bash
        run: |
          set -euo pipefail
          source_dir="pikafish-assets/macos-arm64/pikafish-engines"
          if [ ! -d "${source_dir}" ]; then
            echo "::error::The prepared macOS ARM64 Pikafish engine bundle is missing."
            exit 1
          fi
          rm -rf pikafish-engines
          mkdir -p pikafish-engines
          while IFS= read -r engine_path; do
            install -m 755 "${engine_path}" "pikafish-engines/$(basename "${engine_path}")"
          done < <(find "${source_dir}" -maxdepth 1 -type f -name 'pikafish*' | sort)
          if ! find pikafish-engines -maxdepth 1 -type f -name 'pikafish*' -print -quit | grep -q .; then
            echo "::error::Could not find macOS Pikafish engines in the prepared bundle."
            exit 1
          fi
          if [ ! -s pikafish-assets/pikafish.nnue ]; then
            echo "::error::pikafish.nnue is missing or empty in the prepared bundle."
            exit 1
          fi
          install -m 644 pikafish-assets/pikafish.nnue pikafish.nnue
          find pikafish-engines -maxdepth 1 -type f -print | sort

      - name: Validate engine assets
        shell: bash
        run: |
          set -euo pipefail
          file pikafish-engines/* pikafish.nnue
          for engine_path in pikafish-engines/pikafish*; do
            file "${engine_path}" | grep -q "Mach-O.*arm64" || {
              echo "::error::${engine_path} must be a macOS arm64 Mach-O executable."
              exit 1
            }
          done
          test -s pikafish.nnue || {
            echo "::error::pikafish.nnue is missing or empty."
            exit 1
          }

      - name: Build packages
        run: npm run dist:mac:arm64

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: macos-arm64
          ARTIFACT_SUFFIXES: ".dmg,.zip"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-macos-arm64-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/macos-arm64-sha256.txt

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos-arm64
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_to_release }}

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xiangqi-*-${{ env.RELEASE_TAG }}
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          gh release view "${tag}" >/dev/null 2>&1 || \
            gh release create "${tag}" \
              --draft \
              --title "xiangqi ${tag}" \
              --notes "Automated release artifacts for Windows, Linux, and macOS ARM64."
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets found."
            exit 1
          fi
          gh release upload "${tag}" "${files[@]}" --clobber
          mapfile -t assets < <(gh release view "${tag}" --json assets --jq '.assets[].name' | sort)
          expected=(
            "linux-sha256.txt"
            "macos-arm64-sha256.txt"
            "windows-sha256.txt"
            "xiangqi-${version}-linux-amd64.deb"
            "xiangqi-${version}-linux-x64.tar.gz"
            "xiangqi-${version}-linux-x86_64.AppImage"
            "xiangqi-${version}-mac-arm64.dmg"
            "xiangqi-${version}-mac-arm64.zip"
            "xiangqi-${version}-win-x64.exe"
            "xiangqi-${version}-win-x64.zip"
          )
          for name in "${expected[@]}"; do
            if ! printf '%s\n' "${assets[@]}" | grep -Fxq "${name}"; then
              echo "::error::Missing release asset: ${name}"
              exit 1
            fi
          done
          gh release edit "${tag}" --draft=false
