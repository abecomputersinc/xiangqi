name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.0.3"
        required: true
        type: string
      pikafish_url:
        description: "Direct URL for the official Pikafish release .7z archive"
        required: true
        default: "https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z"
        type: string
      upload_to_release:
        description: "Upload artifacts to the GitHub release for tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  PIKAFISH_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.pikafish_url || 'https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z' }}

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install archive tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full || sudo apt-get install -y 7zip

      - name: Download Pikafish release archive
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/pikafish.7z"
          release_dir="${RUNNER_TEMP}/pikafish-release"
          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --max-time 300 \
            "${PIKAFISH_URL}" \
            -o "${archive}"
          rm -rf "${release_dir}"
          mkdir -p "${release_dir}"
          7z x "${archive}" -o"${release_dir}" -y

      - name: Install bundled Pikafish engines
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${RUNNER_TEMP}/pikafish-release"
          platform_dir="$(find "${release_dir}" -type d -name Linux -print -quit)"
          if [ -z "${platform_dir}" ]; then
            echo "::error::Could not find the Linux engine directory in the Pikafish release archive."
            find "${release_dir}" -maxdepth 3 -type d -print
            exit 1
          fi
          rm -rf pikafish-engines
          mkdir -p pikafish-engines
          while IFS= read -r engine_path; do
            install -m 755 "${engine_path}" "pikafish-engines/$(basename "${engine_path}")"
          done < <(find "${platform_dir}" -maxdepth 1 -type f -name 'pikafish*' ! -name '*.nnue' | sort)
          if ! find pikafish-engines -maxdepth 1 -type f -name 'pikafish*' -print -quit | grep -q .; then
            echo "::error::Could not find Linux Pikafish engines in the release archive."
            exit 1
          fi
          find pikafish-engines -maxdepth 1 -type f -print | sort

      - name: Install NNUE from Pikafish release archive
        shell: bash
        run: |
          set -euo pipefail
          nnue_path="$(find "${RUNNER_TEMP}/pikafish-release" -type f -name 'pikafish.nnue' -print -quit)"
          if [ -z "${nnue_path}" ]; then
            echo "::error::pikafish.nnue was not found in the Pikafish release archive."
            exit 1
          fi
          install -m 644 "${nnue_path}" pikafish.nnue

      - name: Validate engine assets
        shell: bash
        run: |
          set -euo pipefail
          file pikafish-engines/* pikafish.nnue
          for engine_path in pikafish-engines/pikafish*; do
            file "${engine_path}" | grep -q "ELF" || {
              echo "::error::${engine_path} must be a Linux ELF executable."
              exit 1
            }
          done
          test -s pikafish.nnue || {
            echo "::error::pikafish.nnue is missing or empty."
            exit 1
          }

      - name: Build packages
        run: npm run dist:linux

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: linux
          ARTIFACT_SUFFIXES: ".AppImage,.deb,.tar.gz"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-linux-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/linux-sha256.txt

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Pikafish release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Join-Path $env:RUNNER_TEMP "pikafish.7z"
          $extractDir = Join-Path $env:RUNNER_TEMP "pikafish-release"
          curl.exe `
            --fail `
            --location `
            --retry 5 `
            --retry-delay 5 `
            --retry-all-errors `
            --connect-timeout 30 `
            --max-time 300 `
            "$env:PIKAFISH_URL" `
            --output "$archive"
          if (Test-Path -LiteralPath $extractDir) {
            Remove-Item -LiteralPath $extractDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractDir | Out-Null
          $sevenZipCommand = Get-Command 7z -ErrorAction SilentlyContinue
          $sevenZip = if ($sevenZipCommand) { $sevenZipCommand.Source } else { $null }
          if (!$sevenZip -and (Test-Path -LiteralPath "C:\Program Files\7-Zip\7z.exe")) {
            $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          }
          if (!$sevenZip) {
            throw "7z was not found on the Windows runner."
          }
          & $sevenZip x "$archive" "-o$extractDir" -y

      - name: Install bundled Pikafish engines
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $env:RUNNER_TEMP "pikafish-release"
          $platformDir = Get-ChildItem -LiteralPath $releaseDir -Recurse -Directory |
            Where-Object { $_.Name -eq "Windows" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$platformDir) {
            throw "Could not find the Windows engine directory in the Pikafish release archive."
          }
          $targetDir = Join-Path (Get-Location) "pikafish-engines"
          if (Test-Path -LiteralPath $targetDir) {
            Remove-Item -LiteralPath $targetDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $targetDir | Out-Null
          $engines = Get-ChildItem -LiteralPath $platformDir -File -Filter "pikafish*.exe" | Sort-Object Name
          if (!$engines) {
            throw "Could not find Windows Pikafish engines in the release archive."
          }
          foreach ($engine in $engines) {
            Copy-Item -LiteralPath $engine.FullName -Destination (Join-Path $targetDir $engine.Name) -Force
          }
          Get-ChildItem -LiteralPath $targetDir -File | Select-Object Name, Length | Format-Table -AutoSize

      - name: Install NNUE from Pikafish release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $env:RUNNER_TEMP "pikafish-release"
          $nnuePath = Get-ChildItem -LiteralPath $releaseDir -Recurse -File -Filter "pikafish.nnue" |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$nnuePath) {
            throw "pikafish.nnue was not found in the Pikafish release archive."
          }
          Copy-Item -LiteralPath $nnuePath -Destination "pikafish.nnue" -Force

      - name: Validate engine assets
        shell: pwsh
        run: |
          if (!(Test-Path "pikafish-engines")) { throw "pikafish-engines was not created." }
          if (!(Get-ChildItem -LiteralPath "pikafish-engines" -File -Filter "pikafish*.exe")) { throw "No Windows Pikafish engines were copied." }
          if (!(Test-Path "pikafish.nnue")) { throw "pikafish.nnue was not copied from the Pikafish release archive." }
          Get-ChildItem pikafish-engines
          Get-Item pikafish.nnue | Format-Table Name, Length

      - name: Build packages
        run: npm run dist:win

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: windows
          ARTIFACT_SUFFIXES: ".exe,.zip"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-windows-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/windows-sha256.txt

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install archive tools
        shell: bash
        run: |
          set -euo pipefail
          if command -v 7zz >/dev/null 2>&1 || command -v 7z >/dev/null 2>&1; then
            exit 0
          fi
          brew install p7zip

      - name: Download Pikafish release archive
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/pikafish.7z"
          release_dir="${RUNNER_TEMP}/pikafish-release"
          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --max-time 300 \
            "${PIKAFISH_URL}" \
            -o "${archive}"
          rm -rf "${release_dir}"
          mkdir -p "${release_dir}"
          sevenzip="$(command -v 7zz || command -v 7z)"
          "${sevenzip}" x "${archive}" -o"${release_dir}" -y

      - name: Install bundled Pikafish engines
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${RUNNER_TEMP}/pikafish-release"
          platform_dir="$(find "${release_dir}" -type d -name MacOS -print -quit)"
          if [ -z "${platform_dir}" ]; then
            echo "::error::Could not find the macOS engine directory in the Pikafish release archive."
            find "${release_dir}" -maxdepth 3 -type d -print
            exit 1
          fi
          rm -rf pikafish-engines
          mkdir -p pikafish-engines
          while IFS= read -r engine_path; do
            install -m 755 "${engine_path}" "pikafish-engines/$(basename "${engine_path}")"
          done < <(find "${platform_dir}" -maxdepth 1 -type f -name 'pikafish*' ! -name '*.nnue' | sort)
          if ! find pikafish-engines -maxdepth 1 -type f -name 'pikafish*' -print -quit | grep -q .; then
            echo "::error::Could not find macOS Pikafish engines in the release archive."
            exit 1
          fi
          find pikafish-engines -maxdepth 1 -type f -print | sort

      - name: Install NNUE from Pikafish release archive
        shell: bash
        run: |
          set -euo pipefail
          nnue_path="$(find "${RUNNER_TEMP}/pikafish-release" -type f -name 'pikafish.nnue' -print -quit)"
          if [ -z "${nnue_path}" ]; then
            echo "::error::pikafish.nnue was not found in the Pikafish release archive."
            exit 1
          fi
          install -m 644 "${nnue_path}" pikafish.nnue

      - name: Validate engine assets
        shell: bash
        run: |
          set -euo pipefail
          file pikafish-engines/* pikafish.nnue
          for engine_path in pikafish-engines/pikafish*; do
            file "${engine_path}" | grep -q "Mach-O.*arm64" || {
              echo "::error::${engine_path} must be a macOS arm64 Mach-O executable."
              exit 1
            }
          done
          test -s pikafish.nnue || {
            echo "::error::pikafish.nnue is missing or empty."
            exit 1
          }

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          build_dir="/private/tmp/xiangqi-macos-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "${build_dir}"
          mkdir -p "${build_dir}"
          git archive --format=tar HEAD | tar -C "${build_dir}" -xf -
          cp -R pikafish-engines "${build_dir}/pikafish-engines"
          cp pikafish.nnue "${build_dir}/pikafish.nnue"
          npm ci --prefix "${build_dir}"
          npm --prefix "${build_dir}" run dist:mac:arm64
          rm -rf dist
          mkdir -p dist
          cp "${build_dir}"/dist/*.dmg "${build_dir}"/dist/*.zip dist/

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: macos-arm64
          ARTIFACT_SUFFIXES: ".dmg,.zip"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Stage macOS assets in draft release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_to_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          gh release view "${tag}" >/dev/null 2>&1 || \
            gh release create "${tag}" \
              --draft \
              --title "xiangqi ${tag}" \
              --notes "Automated release artifacts for Windows, Linux, and macOS ARM64."
          gh release upload "${tag}" \
            dist/*.dmg \
            dist/*.zip \
            dist/macos-arm64-sha256.txt \
            --clobber

      - name: Upload workflow artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.upload_to_release }}
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-macos-arm64-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/macos-arm64-sha256.txt

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos-arm64
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_to_release }}

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xiangqi-*-${{ env.RELEASE_TAG }}
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          gh release view "${tag}" >/dev/null 2>&1 || \
            gh release create "${tag}" \
              --draft \
              --title "xiangqi ${tag}" \
              --notes "Automated release artifacts for Windows, Linux, and macOS ARM64."
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets found."
            exit 1
          fi
          gh release upload "${tag}" "${files[@]}" --clobber
          mapfile -t assets < <(gh release view "${tag}" --json assets --jq '.assets[].name' | sort)
          expected=(
            "linux-sha256.txt"
            "macos-arm64-sha256.txt"
            "windows-sha256.txt"
            "xiangqi-${version}-linux-amd64.deb"
            "xiangqi-${version}-linux-x64.tar.gz"
            "xiangqi-${version}-linux-x86_64.AppImage"
            "xiangqi-${version}-mac-arm64.dmg"
            "xiangqi-${version}-mac-arm64.zip"
            "xiangqi-${version}-win-x64.exe"
            "xiangqi-${version}-win-x64.zip"
          )
          for name in "${expected[@]}"; do
            if ! printf '%s\n' "${assets[@]}" | grep -Fxq "${name}"; then
              echo "::error::Missing release asset: ${name}"
              exit 1
            fi
          done
          gh release edit "${tag}" --draft=false
