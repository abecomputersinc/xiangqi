name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.0.3"
        required: true
        type: string
      pikafish_ref:
        description: "Pikafish git branch, tag, or commit to build"
        required: true
        default: "master"
        type: string
      nnue_url:
        description: "Direct URL for pikafish.nnue; leave default for official master-net"
        required: false
        default: "https://github.com/official-pikafish/Networks/releases/download/master-net/pikafish.nnue"
        type: string
      upload_to_release:
        description: "Upload artifacts to the GitHub release for tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  PIKAFISH_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.pikafish_ref || 'master' }}
  NNUE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.nnue_url || 'https://github.com/official-pikafish/Networks/releases/download/master-net/pikafish.nnue' }}

jobs:
  prepare-nnue:
    name: Prepare NNUE
    runs-on: ubuntu-latest

    steps:
      - name: Download NNUE
        shell: bash
        run: |
          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --max-time 300 \
            "${NNUE_URL}" \
            -o pikafish.nnue

      - name: Upload NNUE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-nnue-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          retention-days: 1
          path: pikafish.nnue

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare-nnue

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install engine build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Build Pikafish
        shell: bash
        run: |
          set -euo pipefail
          src="${RUNNER_TEMP}/pikafish"
          rm -rf "${src}"
          git clone --depth 1 --branch "${PIKAFISH_REF}" \
            https://github.com/official-pikafish/Pikafish.git \
            "${src}" || {
              rm -rf "${src}"
              git clone --filter=blob:none https://github.com/official-pikafish/Pikafish.git "${src}"
              git -C "${src}" checkout "${PIKAFISH_REF}"
            }
          jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 2)"
          make -C "${src}/src" -j"${jobs}" profile-build ARCH=x86-64
          engine_path="$(find "${src}/src" -maxdepth 1 -type f -perm -111 -name 'pikafish*' -print -quit)"
          if [ -z "${engine_path}" ]; then
            echo "::error::Could not find built Pikafish executable."
            find "${src}/src" -maxdepth 1 -type f -perm -111 -print
            exit 1
          fi
          install -m 755 "${engine_path}" pikafish

      - name: Restore NNUE artifact
        uses: actions/download-artifact@v4
        with:
          name: pikafish-nnue-${{ env.RELEASE_TAG }}
          path: .

      - name: Validate engine assets
        shell: bash
        run: |
          set -euo pipefail
          file pikafish pikafish.nnue
          file pikafish | grep -q "ELF" || {
            echo "::error::pikafish must be a Linux ELF executable."
            exit 1
          }

      - name: Build packages
        run: npm run dist:linux

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: linux
          ARTIFACT_SUFFIXES: ".AppImage,.deb,.tar.gz"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-linux-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/linux-sha256.txt

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-nnue

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc

      - name: Build Pikafish
        shell: msys2 {0}
        run: |
          set -euo pipefail
          src="/tmp/pikafish"
          workspace="$(cygpath -u "${GITHUB_WORKSPACE}")"
          rm -rf "${src}"
          git clone --depth 1 --branch "${PIKAFISH_REF}" \
            https://github.com/official-pikafish/Pikafish.git \
            "${src}" || {
              rm -rf "${src}"
              git clone --filter=blob:none https://github.com/official-pikafish/Pikafish.git "${src}"
              git -C "${src}" checkout "${PIKAFISH_REF}"
            }
          make -C "${src}/src" -j"$(nproc)" profile-build ARCH=x86-64
          engine_path="$(find "${src}/src" -maxdepth 1 -type f -name 'pikafish*.exe' -print -quit)"
          if [ -z "${engine_path}" ]; then
            echo "::error::Could not find built Pikafish executable."
            find "${src}/src" -maxdepth 1 -type f -print
            exit 1
          fi
          cp "${engine_path}" "${workspace}/pikafish.exe"

      - name: Restore NNUE artifact
        uses: actions/download-artifact@v4
        with:
          name: pikafish-nnue-${{ env.RELEASE_TAG }}
          path: .

      - name: Validate engine assets
        shell: pwsh
        run: |
          if (!(Test-Path "pikafish.exe")) { throw "pikafish.exe was not built." }
          if (!(Test-Path "pikafish.nnue")) { throw "pikafish.nnue was not downloaded." }
          Get-Item pikafish.exe, pikafish.nnue | Format-Table Name, Length

      - name: Build packages
        run: npm run dist:win

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: windows
          ARTIFACT_SUFFIXES: ".exe,.zip"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-windows-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/windows-sha256.txt

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: [self-hosted, macOS, ARM64]
    needs: prepare-nnue

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Pikafish
        shell: bash
        run: |
          set -euo pipefail
          src="${RUNNER_TEMP}/pikafish"
          rm -rf "${src}"
          git clone --depth 1 --branch "${PIKAFISH_REF}" \
            https://github.com/official-pikafish/Pikafish.git \
            "${src}" || {
              rm -rf "${src}"
              git clone --filter=blob:none https://github.com/official-pikafish/Pikafish.git "${src}"
              git -C "${src}" checkout "${PIKAFISH_REF}"
            }
          jobs="$(sysctl -n hw.ncpu 2>/dev/null || echo 2)"
          make -C "${src}/src" -j"${jobs}" profile-build
          engine_path="$(find "${src}/src" -maxdepth 1 -type f -perm -111 -name 'pikafish*' -print -quit)"
          if [ -z "${engine_path}" ]; then
            echo "::error::Could not find built Pikafish executable."
            find "${src}/src" -maxdepth 1 -type f -perm -111 -print
            exit 1
          fi
          install -m 755 "${engine_path}" pikafish

      - name: Restore NNUE artifact
        uses: actions/download-artifact@v4
        with:
          name: pikafish-nnue-${{ env.RELEASE_TAG }}
          path: .

      - name: Validate engine assets
        shell: bash
        run: |
          set -euo pipefail
          file pikafish pikafish.nnue
          file pikafish | grep -q "Mach-O.*arm64" || {
            echo "::error::pikafish must be a macOS arm64 Mach-O executable."
            exit 1
          }

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          build_dir="/private/tmp/xiangqi-macos-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "${build_dir}"
          mkdir -p "${build_dir}"
          git archive --format=tar HEAD | tar -C "${build_dir}" -xf -
          install -m 755 pikafish "${build_dir}/pikafish"
          cp pikafish.nnue "${build_dir}/pikafish.nnue"
          npm ci --prefix "${build_dir}"
          npm --prefix "${build_dir}" run dist:mac:arm64
          rm -rf dist
          mkdir -p dist
          cp "${build_dir}"/dist/*.dmg "${build_dir}"/dist/*.zip dist/

      - name: Write checksums
        shell: bash
        env:
          PLATFORM: macos-arm64
          ARTIFACT_SUFFIXES: ".dmg,.zip"
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const suffixes = process.env.ARTIFACT_SUFFIXES.split(",").filter(Boolean);
          const files = fs.readdirSync("dist").filter(name => suffixes.some(suffix => name.endsWith(suffix))).sort();
          if (!files.length) throw new Error("No release artifacts found.");
          const lines = files.map(name => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(`dist/${name}`)).digest("hex");
            return `${hash}  ${name}`;
          });
          fs.writeFileSync(`dist/${process.env.PLATFORM}-sha256.txt`, `${lines.join("\n")}\n`);
          NODE

      - name: Stage macOS assets in draft release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_to_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          gh release view "${tag}" >/dev/null 2>&1 || \
            gh release create "${tag}" \
              --draft \
              --title "xiangqi ${tag}" \
              --notes "Automated release artifacts for Windows, Linux, and macOS ARM64."
          gh release upload "${tag}" \
            dist/*.dmg \
            dist/*.zip \
            dist/macos-arm64-sha256.txt \
            --clobber

      - name: Upload workflow artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.upload_to_release }}
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-macos-arm64-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/macos-arm64-sha256.txt

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos-arm64
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_to_release }}

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xiangqi-*-${{ env.RELEASE_TAG }}
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          gh release view "${tag}" >/dev/null 2>&1 || \
            gh release create "${tag}" \
              --draft \
              --title "xiangqi ${tag}" \
              --notes "Automated release artifacts for Windows, Linux, and macOS ARM64."
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets found."
            exit 1
          fi
          gh release upload "${tag}" "${files[@]}" --clobber
          mapfile -t assets < <(gh release view "${tag}" --json assets --jq '.assets[].name' | sort)
          expected=(
            "linux-sha256.txt"
            "macos-arm64-sha256.txt"
            "windows-sha256.txt"
            "xiangqi-${version}-linux-amd64.deb"
            "xiangqi-${version}-linux-x64.tar.gz"
            "xiangqi-${version}-linux-x86_64.AppImage"
            "xiangqi-${version}-mac-arm64.dmg"
            "xiangqi-${version}-mac-arm64.zip"
            "xiangqi-${version}-win-x64.exe"
            "xiangqi-${version}-win-x64.zip"
          )
          for name in "${expected[@]}"; do
            if ! printf '%s\n' "${assets[@]}" | grep -Fxq "${name}"; then
              echo "::error::Missing release asset: ${name}"
              exit 1
            fi
          done
          gh release edit "${tag}" --draft=false
