name: Linux release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.0.3"
        required: true
        type: string
      pikafish_ref:
        description: "Pikafish git branch, tag, or commit to build"
        required: true
        default: "master"
        type: string
      nnue_url:
        description: "Direct URL for pikafish.nnue; leave default for official master-net"
        required: false
        default: "https://github.com/official-pikafish/Networks/releases/download/master-net/pikafish.nnue"
        type: string
      pgn_library_url:
        description: "Direct URL for client/pgns/library.sqlite"
        required: true
        type: string
      upload_to_release:
        description: "Upload Linux artifacts to the GitHub release for tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install engine build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Build Pikafish from source
        run: |
          set -euo pipefail
          pikafish_ref="${{ inputs.pikafish_ref }}"
          git clone --depth 1 --branch "${pikafish_ref}" \
            https://github.com/official-pikafish/Pikafish.git \
            /tmp/pikafish || {
              rm -rf /tmp/pikafish
              git clone --filter=blob:none https://github.com/official-pikafish/Pikafish.git /tmp/pikafish
              git -C /tmp/pikafish checkout "${pikafish_ref}"
            }
          make -C /tmp/pikafish/src -j"$(nproc)" profile-build
          engine_path="$(find /tmp/pikafish/src -maxdepth 1 -type f -perm -111 -name 'pikafish*' -print -quit)"
          if [ -z "${engine_path}" ]; then
            echo "::error::Could not find built Pikafish executable in /tmp/pikafish/src."
            find /tmp/pikafish/src -maxdepth 1 -type f -perm -111 -print
            exit 1
          fi
          install -m 755 "${engine_path}" pikafish

      - name: Download NNUE and PGN library
        run: |
          set -euo pipefail
          mkdir -p client/pgns
          nnue_url="${{ inputs.nnue_url }}"
          if [ -z "${nnue_url}" ]; then
            nnue_url="https://github.com/official-pikafish/Networks/releases/download/master-net/pikafish.nnue"
          fi
          curl -fL "${nnue_url}" -o pikafish.nnue
          curl -fL "${{ inputs.pgn_library_url }}" -o client/pgns/library.sqlite

      - name: Validate Linux engine
        run: |
          set -euo pipefail
          file pikafish pikafish.nnue client/pgns/library.sqlite
          file pikafish | grep -q "ELF" || {
            echo "::error::pikafish must be a Linux ELF executable for Linux builds."
            exit 1
          }

      - name: Build Linux packages
        run: npm run dist:linux

      - name: List artifacts
        run: |
          set -euo pipefail
          ls -lh dist
          shasum -a 256 dist/*.{AppImage,deb,tar.gz} | tee dist/linux-sha256.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiangqi-linux-${{ inputs.tag }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/linux-sha256.txt

      - name: Upload to GitHub release
        if: ${{ inputs.upload_to_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${{ inputs.tag }}" >/dev/null 2>&1 || \
            gh release create "${{ inputs.tag }}" --title "xiangqi ${{ inputs.tag }}" --notes "Linux release artifacts."
          gh release upload "${{ inputs.tag }}" \
            dist/*.AppImage \
            dist/*.deb \
            dist/*.tar.gz \
            dist/linux-sha256.txt \
            --clobber
